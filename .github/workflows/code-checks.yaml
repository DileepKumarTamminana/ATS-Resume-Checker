name: Code Checks

# Catches errors in the code: syntax errors, undefined names / bad imports,
# lint issues, and failing tests. Runs on every push and pull request.

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  code-checks:
    name: Lint & Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: [ "3.11", "3.12" ]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install tooling
        run: |
          python -m pip install --upgrade pip
          pip install ruff pytest

      # 1. Syntax check — compile every .py file (catches SyntaxError).
      - name: Compile all Python files
        run: python -m compileall -q .

      # 2. Critical errors — undefined names, bad imports, broken syntax.
      #    These fail the build (equivalent to flake8's "stop the build" set).
      - name: Lint (critical errors)
        run: ruff check --select=E9,F63,F7,F82 --output-format=full .

      # 3. Full lint — style + quality. Informational, does not fail the build.
      - name: Lint (full, non-blocking)
        run: ruff check . || true

      # 4. Run the test suite.
      - name: Run tests
        run: pytest -q
