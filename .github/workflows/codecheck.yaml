name: Python Security Vulnerability Scan

on:
  push:
    branches: [ "main","master" ]
  pull_request:
    branches: [ "main","master" ]
  #schedule:
    #- cron: '30 18 * * 1' # Runs every Monday at 18:30 UTC

jobs:
  scan:
    name: Security Scan
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # 1. Set up the Python environment (optional, but helps with dependency resolution)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # 2. Initialize CodeQL for Python Static Analysis
      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: 'python'

      # 3. Perform CodeQL Analysis
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

      # 4. Scan Python Dependencies (requirements.txt, Pipfile, poetry.lock)
      - name: Run Trivy dependency scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          ignore-unfixed: true
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'

      # 5. Upload Trivy results to GitHub Security Tab
      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always() # Ensures results upload even if issues are found
        with:
          sarif_file: 'trivy-results.sarif'
