name: Lint (all files)

# Universal linter (Super-Linter) for non-Python files. Runs in opt-in mode:
# only the validators enabled below run, which keeps results predictable.
# Python is intentionally left to ruff/mypy in code-checks.yaml.
#
# To lint a language you add later, set its flag to true, e.g.:
#   VALIDATE_JAVASCRIPT_ES: true      # JS/TS
#   VALIDATE_GO: true
#   VALIDATE_DOCKERFILE_HADOLINT: true

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  super-lint:
    name: Super-Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so PRs can lint only changed files

      - name: Lint codebase
        uses: super-linter/super-linter@v7
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true

          # Rule configs live in .github/linters/.
          MARKDOWN_CONFIG_FILE: .markdown-lint.yml
          YAML_CONFIG_FILE: .yaml-lint.yml

          # Opt-in: only these validators run.
          VALIDATE_YAML: true
          VALIDATE_MARKDOWN: true
          VALIDATE_JSON: true
          VALIDATE_GITHUB_ACTIONS: true
          VALIDATE_BASH: true
