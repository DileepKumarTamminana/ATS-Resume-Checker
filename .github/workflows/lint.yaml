name: Lint (all files)

# Config & docs linting via dedicated, transparent steps — each linter is its
# own step so failures are easy to attribute. Python is linted by ruff/mypy in
# code-checks.yaml. Add language linters here as steps when new languages land.

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  lint:
    name: Config & docs lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Lint GitHub Actions workflows (actionlint)
        uses: raven-actions/actionlint@v2

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lint YAML (yamllint)
        run: |
          pip install yamllint
          yamllint -c .yamllint.yml .

      - name: Lint Markdown (markdownlint)
        uses: DavidAnson/markdownlint-cli2-action@v16
        with:
          globs: "**/*.md"
