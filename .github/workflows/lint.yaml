name: Lint (all files)

# Universal linter — validates every file type in the repo and automatically
# extends to any language added later (JS/TS, Java, Go, Ruby, Dockerfile, …).
# Today it lints YAML, Markdown, JSON, shell, and the GitHub Actions workflows.
# Python is intentionally left to ruff/mypy in code-checks.yaml.

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

permissions:
  contents: read

jobs:
  super-lint:
    name: Super-Linter
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # full history so PRs can lint only changed files

      - name: Lint codebase
        uses: super-linter/super-linter@v7
        env:
          DEFAULT_BRANCH: main
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALIDATE_ALL_CODEBASE: true

          # Python is already covered by ruff + mypy in code-checks.yaml.
          VALIDATE_PYTHON_BLACK: false
          VALIDATE_PYTHON_FLAKE8: false
          VALIDATE_PYTHON_ISORT: false
          VALIDATE_PYTHON_MYPY: false
          VALIDATE_PYTHON_PYLINT: false
          VALIDATE_PYTHON_RUFF: false

          # Noisy / security scanners handled elsewhere or not wanted here.
          VALIDATE_JSCPD: false
          VALIDATE_GITLEAKS: false
          VALIDATE_CHECKOV: false
          VALIDATE_EDITORCONFIG: false
          VALIDATE_NATURAL_LANGUAGE: false
