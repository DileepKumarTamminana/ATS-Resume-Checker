# markdownlint configuration (used by markdownlint-cli2).
# Keep structural checks; relax stylistic rules that hand-written docs trip.
default: true
MD013: false   # line length
MD024: false   # duplicate heading text
MD026: false   # trailing punctuation in headings
MD029: false   # ordered list numbering style
MD033: false   # inline HTML — allowed in docs
MD034: false   # bare URLs (e.g. http://localhost:8000)
MD036: false   # emphasis used instead of a heading
MD040: false   # fenced code blocks without a language
MD041: false   # first line need not be a top-level heading
MD046: false   # code block style (indented vs fenced)
