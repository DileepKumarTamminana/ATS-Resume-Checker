# yamllint configuration.
extends: default
rules:
  line-length: disable
  document-start: disable      # workflows don't need a leading ---
  truthy:
    check-keys: false          # allow the `on:` workflow trigger key
  comments:
    min-spaces-from-content: 1
  comments-indentation: disable
  brackets:
    max-spaces-inside: 1       # allow [ "a", "b" ]
  commas:
    min-spaces-after: 0        # allow "a","b"
